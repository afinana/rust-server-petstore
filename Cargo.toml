[package]
name = "rust-server-petstore"
version = "1.0.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
# actix-web for web server
actix-web = "4.0"
ring = "0.17.8"
rustls = { version = "0.22.4", default-features = false }
webpki = "0.22.4"
webpki-roots = "0.26.1"

# serde for serialization and deserialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# redis client
redis = "0.25.0"
# add log and env_logger for logging
env_logger = "0.9.0"
log = "0.4"  # Add this line

# Lapin dependencies
lapin = "2.2.0"
tokio = { version = "1", features = ["full"] }
futures-util = "0.3"

