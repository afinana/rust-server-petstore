[package]
name = "rust-server-petstore"
version = "1.0.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix-web = "4.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.137"
# if you use tokio
redis = { version = "0.28.1", features = ["tokio-comp"] }
# add log and env_logger for logging
env_logger = "0.11.6"
log = "0.4"  # Add this line
